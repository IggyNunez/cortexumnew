    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1446534276921018');
      fbq('track', 'PageView');

      // Enhanced event tracking
      document.addEventListener('DOMContentLoaded', function() {
        // Track all CTA clicks (Book a Strategy Call, outbound links)
        document.addEventListener('click', function(e) {
          var link = e.target.closest('a');
          if (!link) return;
          var href = link.href || '';

          // Calendly / booking clicks
          if (href.includes('calendly.com')) {
            fbq('track', 'Schedule', { content_name: 'Strategy Call' });
            fbq('track', 'Lead', { content_name: 'Strategy Call Booking' });
          }

          // Internal nav clicks
          if (href.includes('#how-we-help')) {
            fbq('track', 'ViewContent', { content_name: 'How We Help' });
          }
          if (href.includes('#results')) {
            fbq('track', 'ViewContent', { content_name: 'Case Studies' });
          }
          if (href.includes('#contact')) {
            fbq('track', 'ViewContent', { content_name: 'Contact Section' });
          }

          // External link clicks
          if (link.target === '_blank' && !href.includes(window.location.hostname)) {
            fbq('trackCustom', 'OutboundClick', { url: href });
          }
        });

        // Track scroll depth milestones
        var scrollMilestones = { 25: false, 50: false, 75: false, 100: false };
        window.addEventListener('scroll', function() {
          var scrollPct = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
          [25, 50, 75, 100].forEach(function(m) {
            if (scrollPct >= m && !scrollMilestones[m]) {
              scrollMilestones[m] = true;
              fbq('trackCustom', 'ScrollDepth', { percent: m });
            }
          });
        }, { passive: true });

        // Track time on page milestones
        [30, 60, 120, 300].forEach(function(seconds) {
          setTimeout(function() {
            fbq('trackCustom', 'TimeOnPage', { seconds: seconds });
          }, seconds * 1000);
        });
      });
    </script>
    <!-- End Meta Pixel Code -->
  </head>
  <body>
    <!-- Meta Pixel noscript fallback -->

    src="https://www.facebook.com/tr?id=1446534276921018&ev=PageView&noscript=1"
    /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>


    <!-- Tab title animation script -->
    <script>
      // Animated tab title with rotating messages
      (function() {
        // Array of messages to display in the tab title
        const messages = [
          "✨ Psychology-Based Marketing",
          "🧠 AI-Powered Marketing Strategies",
          "🚀 Custom AI Marketing Agents",
          "💼 Media Buying Expertise",
          "🤖 Psychology & AI Combined",
          "💰 Superior Marketing Results",
          "🔮 Intelligent Solutions",
          "⚡ Outperform Traditional Marketing"
        ];
        
        let currentIndex = 0;
        let direction = 1;
        const baseTitle = "Cortexuum";
        
        // Emoji spinner frames
        const spinnerFrames = ["⣾", "⣽", "⣻", "⢿", "⡿", "⣟", "⣯", "⣷"];
        let spinnerIndex = 0;
        
        // Update the title periodically
        setInterval(() => {
          spinnerIndex = (spinnerIndex + 1) % spinnerFrames.length;
          currentIndex = (currentIndex + direction) % messages.length;
          if (currentIndex === 0) direction = 1;
          if (currentIndex === messages.length - 1) direction = -1;
          
          document.title = `${spinnerFrames[spinnerIndex]} ${messages[currentIndex]} | ${baseTitle}`;
        }, 2200);
      })();
    </script>
  </body>
